name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  real-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test -- src/__tests__/real-backend.test.ts
        env:
          INTERFACER_ZENFLOWS_URL: ${{ secrets.INTERFACER_ZENFLOWS_URL }}
          INTERFACER_ZENFLOWS_FILE_URL: ${{ secrets.INTERFACER_ZENFLOWS_FILE_URL }}
          INTERFACER_DPP_URL: ${{ secrets.INTERFACER_DPP_URL }}
          INTERFACER_INBOX_SEND: ${{ secrets.INTERFACER_INBOX_SEND }}
          INTERFACER_INBOX_READ: ${{ secrets.INTERFACER_INBOX_READ }}
          INTERFACER_INBOX_COUNT_UNREAD: ${{ secrets.INTERFACER_INBOX_COUNT_UNREAD }}
          INTERFACER_INBOX_SET_READ: ${{ secrets.INTERFACER_INBOX_SET_READ }}
          INTERFACER_WALLET_URL: ${{ secrets.INTERFACER_WALLET_URL }}
          INTERFACER_SOCIAL_PERSON: ${{ secrets.INTERFACER_SOCIAL_PERSON }}
          INTERFACER_SOCIAL_ER: ${{ secrets.INTERFACER_SOCIAL_ER }}
          INTERFACER_OSH_URL: ${{ secrets.INTERFACER_OSH_URL }}
          INTERFACER_LOSH_ID: ${{ secrets.INTERFACER_LOSH_ID }}
          INTERFACER_ZENFLOWS_ADMIN: ${{ secrets.INTERFACER_ZENFLOWS_ADMIN }}
          INTERFACER_SPEC_MACHINE: ${{ secrets.INTERFACER_SPEC_MACHINE }}
          INTERFACER_SPEC_DPP: ${{ secrets.INTERFACER_SPEC_DPP }}
