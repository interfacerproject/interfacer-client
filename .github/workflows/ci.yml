name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm vitest run src/__tests__/unit.test.ts src/__tests__/integration.test.ts

  real-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install
      - run: pnpm build
      - name: Write .env from secrets (vitest auto-loads it)
        run: |
          cat > .env << 'EOF'
          INTERFACER_PROXY_URL=${{ secrets.INTERFACER_PROXY_URL }}
          INTERFACER_LOSH_ID=${{ secrets.INTERFACER_LOSH_ID }}
          INTERFACER_ZENFLOWS_ADMIN=${{ secrets.INTERFACER_ZENFLOWS_ADMIN }}
          INTERFACER_SPEC_MACHINE=${{ secrets.INTERFACER_SPEC_MACHINE }}
          INTERFACER_SPEC_DPP=${{ secrets.INTERFACER_SPEC_DPP }}
          EOF
      - run: pnpm test -- src/__tests__/real-backend.test.ts
