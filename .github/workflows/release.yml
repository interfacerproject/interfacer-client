name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags + GitHub releases
      issues: write   # comment on referenced issues
      pull-requests: write # comment on PRs
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for commit analysis

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Debug OIDC / .npmrc
        shell: bash
        run: |
          echo "=== .npmrc ==="
          cat ~/.npmrc 2>/dev/null || echo "(no ~/.npmrc)"
          echo ""
          echo "=== NODE_AUTH_TOKEN set? ==="
          [[ -n "$NODE_AUTH_TOKEN" ]] && echo "YES (length: ${#NODE_AUTH_TOKEN})" || echo "NO"
          echo ""
          echo "=== npm whoami ==="
          npm whoami --registry=https://registry.npmjs.org 2>&1 || echo "(failed)"
          echo ""
          echo "=== OIDC token from actions ==="
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://registry.npmjs.org" | head -c 500 || echo "(failed)"
          echo ""

      - name: Semantic Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
