name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags + GitHub releases
      issues: write   # comment on referenced issues
      pull-requests: write # comment on PRs
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for commit analysis

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Semantic Release
        id: release
        run: |
          git tag > /tmp/tags-before.txt
          pnpm exec semantic-release
          git tag > /tmp/tags-after.txt
          if ! diff -q /tmp/tags-before.txt /tmp/tags-after.txt > /dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.release.outputs.published == 'true'
        run: npm publish --provenance --access public
